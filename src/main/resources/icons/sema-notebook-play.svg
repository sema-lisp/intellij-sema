<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <rect width="16" height="16" rx="3" fill="#1a1a1a"/>
  <!-- notebook page -->
  <rect x="2.5" y="1.5" width="10" height="13" rx="1" fill="none" stroke="#c8a855" stroke-width="0.7" opacity="0.5"/>
  <!-- cell line -->
  <line x1="3.5" y1="5" x2="11.5" y2="5" stroke="#c8a855" stroke-width="0.6" opacity="0.35"/>
  <!-- S -->
  <text x="7.5" y="12.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="7" fill="#c8a855">S</text>
  <!-- play badge -->
  <circle cx="12.5" cy="12.5" r="2.5" fill="#c8a855" opacity="0.9"/>
  <polygon points="11.8,11.5 11.8,13.5 13.3,12.5" fill="#1a1a1a"/>
</svg>