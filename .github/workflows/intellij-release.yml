# Sign and publish the Sema IntelliJ plugin to the JetBrains Marketplace.
#
# Manually dispatched (workflow_dispatch): a release is a reviewed action, not an automatic
# side-effect of pushing a tag. This workflow creates no tags and no GitHub Releases.
#
# Requires four repository secrets: PUBLISH_TOKEN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD,
# CERTIFICATE_CHAIN. See RELEASING.md and
# https://plugins.jetbrains.com/docs/intellij/plugin-signing.html

name: IntelliJ Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Sign and upload the ZIP as an artifact only (do not publish to Marketplace)'
        type: boolean
        default: false

jobs:
  release:
    name: Publish plugin
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Sign plugin (dry run)
        if: ${{ inputs.dry_run }}
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin

      - name: Publish plugin
        if: ${{ !inputs.dry_run }}
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Upload signed artifact
        uses: actions/upload-artifact@v5
        with:
          name: signed-plugin-distribution
          path: build/distributions/*-signed.zip
