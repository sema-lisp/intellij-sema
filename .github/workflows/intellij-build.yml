# Build, test, and verify the Sema IntelliJ plugin.
#
# Does NOT create GitHub Releases or tags — publishing is handled separately by
# intellij-release.yml (manual dispatch).

name: IntelliJ Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: intellij-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build plugin
        run: ./gradlew buildPlugin
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: plugin-distribution
          path: build/distributions/*.zip

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true
      # The LSP/DAP tests shell out to a real `sema` binary; install it so those
      # tests actually run rather than being skipped for lack of a binary.
      # Fetch the prebuilt release binary via the cargo-dist installer instead
      # of compiling from source (fast, no system build deps).
      - name: Install Sema
        env:
          SEMA_LANG_INSTALL_DIR: ${{ runner.temp }}/sema-bin
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/HelgeSverre/sema/releases/latest/download/sema-lang-installer.sh | sh
          echo "$SEMA_LANG_INSTALL_DIR" >> "$GITHUB_PATH"
      - name: Run tests
        run: ./gradlew check
      - name: Collect test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: tests-result
          path: build/reports/tests

  verify:
    name: Verify plugin
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true
      - name: Run plugin verification
        run: ./gradlew verifyPlugin
      - name: Collect verifier result
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: pluginVerifier-result
          path: build/reports/pluginVerifier
