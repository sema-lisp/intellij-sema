# Build, test, and verify the Sema IntelliJ plugin.
#
# Does NOT create GitHub Releases or tags — publishing is handled separately by
# intellij-release.yml (manual dispatch).

name: IntelliJ Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: intellij-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build plugin
        run: ./gradlew buildPlugin
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: plugin-distribution
          path: build/distributions/*.zip

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true
      # The LSP/DAP tests shell out to a real `sema` binary; install it so those
      # tests actually run rather than being skipped for lack of a binary.
      # sema pulls in libudev-sys (via a transitive dep), which needs the
      # system libudev headers to build on Linux.
      - name: Install build deps for Sema
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Install Sema
        run: cargo install sema-lang --locked
      - name: Run tests
        run: ./gradlew check
      - name: Collect test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v5
        with:
          name: tests-result
          path: build/reports/tests

  verify:
    name: Verify plugin
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: true
      - name: Run plugin verification
        run: ./gradlew verifyPlugin
      - name: Collect verifier result
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: pluginVerifier-result
          path: build/reports/pluginVerifier
